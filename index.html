<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Gift Card — ¡Feliz cumple!</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,500;0,600;1,500&family=Dancing+Script:wght@600;700&family=Poppins:wght@400;500;600&display=swap');

  :root{
    --paper:#F1EBDE;
    --paper-dark:#E6DDCB;
    --flap:#C68A9A;
    --flap-dark:#B5798A;
    --rose:#B5798A;
    --brown:#3B2C22;
    --brown-soft:#5C4A3C;
    --pink-1:#E79CAE;
    --pink-2:#D9748F;
    --orange:#E0A23D;
    --leaf:#7C8A5C;
    --purple:#9B82C0;
  }

  *{box-sizing:border-box;}

  html,body{
    margin:0;
    padding:0;
    min-height:100vh;
    background:#F2EDE6;
    background-image:
      radial-gradient(circle at 50% 28%, #F8F4EF 0%, #F2EDE6 55%, #E7DFD4 100%);
    font-family:'Poppins',sans-serif;
    overflow-x:hidden;
  }

  .scene{
    position:relative;
    min-height:100vh;
    display:flex;
    flex-direction:column;
    align-items:center;
    justify-content:center;
    padding:48px 20px 64px;
  }

  .corner{
    position:absolute;
    pointer-events:none;
    opacity:0.9;
    z-index:0;
  }
  .corner.tr{ top:-30px; right:-30px; width:220px; }
  .corner.bl{ bottom:-40px; left:-40px; width:240px; }
  .corner.br{ bottom:-30px; right:-20px; width:140px; opacity:0.85; }

  .heading{
    position:relative;
    z-index:2;
    text-align:center;
    margin-bottom:34px;
  }
  .heading .eyebrow{
    font-family:'Poppins',sans-serif;
    font-size:12px;
    letter-spacing:3px;
    color:var(--rose);
    font-weight:600;
    text-transform:uppercase;
    margin:0 0 6px;
  }
  .heading h1{
    font-family:'Cormorant Garamond',serif;
    font-weight:600;
    letter-spacing:6px;
    text-transform:uppercase;
    font-size:clamp(30px,7vw,46px);
    color:var(--rose);
    margin:0;
  }
  .heading .script{
    font-family:'Dancing Script',cursive;
    font-size:clamp(22px,5vw,30px);
    color:var(--brown);
    margin-top:2px;
  }

  .envelope-wrap{
    position:relative;
    width:min(82vw,380px);
    aspect-ratio:3/2;
    z-index:2;
    cursor:pointer;
    -webkit-tap-highlight-color:transparent;
    user-select:none;
  }

  .envelope{
    position:relative;
    width:100%;
    height:100%;
    perspective:1000px;
  }

  .env-back{
    position:absolute;
    inset:0;
    background:var(--paper);
    border:1px solid #D9CDB5;
    border-radius:8px;
    box-shadow:0 18px 34px -16px rgba(60,40,30,0.35), 0 2px 0 rgba(255,255,255,0.4) inset;
  }

  .env-pocket{
    position:absolute;
    left:0; right:0; bottom:0;
    height:62%;
    background:var(--paper-dark);
    clip-path:polygon(0 100%, 100% 100%, 100% 18%, 50% 78%, 0 18%);
    border-radius:0 0 8px 8px;
    z-index:3;
  }

  .env-flap{
    position:absolute;
    left:0; right:0; top:0;
    height:64%;
    background:linear-gradient(165deg,var(--flap) 0%, var(--flap-dark) 100%);
    clip-path:polygon(0 0, 100% 0, 50% 86%);
    border-radius:8px 8px 0 0;
    transform-origin:top center;
    transform-style:preserve-3d;
    backface-visibility:hidden;
    transition:transform .65s cubic-bezier(.45,0,.55,1), opacity .5s ease .15s, z-index 0s .3s;
    z-index:6;
    box-shadow:0 2px 6px rgba(0,0,0,0.08) inset;
  }

  .env-seal{
    position:absolute;
    left:50%; top:51%;
    width:46px; height:46px;
    transform:translate(-50%,-50%);
    z-index:7;
    transition:transform .35s ease, opacity .3s ease;
  }

  .addr{
    position:absolute;
    left:50%; bottom:14%;
    transform:translateX(-50%);
    text-align:center;
    z-index:4;
    pointer-events:none;
  }
  .addr .para{
    font-family:'Dancing Script',cursive;
    font-size:22px;
    color:var(--brown-soft);
    margin:0;
  }
  .addr .de{
    font-family:'Poppins',sans-serif;
    font-size:10px;
    letter-spacing:2px;
    text-transform:uppercase;
    color:#9C8A74;
    margin:2px 0 0;
  }

  .card-stage{
    position:absolute;
    left:50%; top:58%;
    width:60%;
    opacity:0;
    transform:translate(-50%,-50%) scale(0.35);
    z-index:2;
    pointer-events:none;
    transition:transform .6s cubic-bezier(.34,1.45,.64,1), width .6s cubic-bezier(.34,1.45,.64,1), top .6s cubic-bezier(.34,1.45,.64,1), left .6s cubic-bezier(.34,1.45,.64,1), opacity .35s ease;
  }
  .card-stage img{
    display:block;
    width:100%;
    border-radius:10px;
    box-shadow:0 30px 60px -20px rgba(40,25,15,0.0);
  }

  .scene.open .env-flap{
    transform:rotateX(-150deg);
    opacity:0;
    z-index:1;
  }
  .scene.open .env-seal{
    transform:translate(-50%,-50%) scale(0.2) rotate(50deg);
    opacity:0;
  }
  .scene.open .card-stage{
    left:50%;
    top:50%;
    width:min(86vw,400px);
    opacity:1;
    pointer-events:auto;
    transform:translate(-50%,-50%) scale(1) rotate(-1.2deg);
    z-index:9;
    transition:transform .6s cubic-bezier(.34,1.45,.64,1) .25s, width .6s cubic-bezier(.34,1.45,.64,1) .25s, top .6s cubic-bezier(.34,1.45,.64,1) .25s, left .6s cubic-bezier(.34,1.45,.64,1) .25s, opacity .4s ease .25s;
  }
  .scene.open .card-stage img{
    box-shadow:0 36px 70px -18px rgba(40,25,15,0.45);
  }
  .scene.open .env-back,
  .scene.open .env-pocket{
    box-shadow:none;
  }

  @keyframes breathe{
    0%,100%{ transform:translate(-50%,-51%) scale(1); }
    50%{ transform:translate(-50%,-51%) scale(1.06); }
  }
  .scene:not(.open) .env-seal{
    animation:breathe 2.6s ease-in-out infinite;
  }

  .hint{
    position:relative;
    z-index:2;
    margin-top:26px;
    font-family:'Poppins',sans-serif;
    font-size:13px;
    letter-spacing:1px;
    color:var(--brown-soft);
    text-align:center;
    opacity:0.85;
    transition:opacity .3s ease;
  }
  .hint i{
    font-style:normal;
  }

  @media (max-width:420px){
    .heading{ margin-bottom:26px; }
  }
</style>
</head>

  <p class="hint" id="hint">Tocá el sobre para abrirlo</p>

</div>

<script>
  const scene = document.getElementById('scene');
  const wrap = document.getElementById('envelopeWrap');
  const hint = document.getElementById('hint');

  function toggle(){
    const isOpen = scene.classList.toggle('open');
    hint.textContent = isOpen ? 'Tocá para volver a cerrar el sobre' : 'Tocá el sobre para abrirlo';
  }

  wrap.addEventListener('click', toggle);
  wrap.addEventListener('keydown', (e) => {
    if(e.key === 'Enter' || e.key === ' '){
      e.preventDefault();
      toggle();
    }
  });
</script>
